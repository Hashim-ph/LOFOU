<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOFOU Product</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<style>

.product-page{

    padding:120px 10%;
    min-height:100vh;

}

.product-container{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;

}

.product-image img{

    width:100%;
    border-radius:10px;

}

.product-details h1{

    font-size:42px;
    margin-bottom:20px;

}

.product-price{

    font-size:28px;
    margin-bottom:20px;

}

.product-description{

    line-height:1.8;
    margin-bottom:30px;

}

.size-options{

    display:flex;
    gap:15px;
    margin-bottom:30px;

}

.size-options button{

    padding:12px 20px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;

}

.action-buttons{

    display:flex;
    gap:20px;

}

.action-buttons button{

    padding:15px 30px;
    border:none;
    cursor:pointer;
    background:black;
    color:white;

}

.related-products{

    margin-top:100px;

}

.related-grid{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;

}

.related-card img{

    width:100%;
    height:350px;
    object-fit:cover;

}

@media(max-width:768px){

.product-container{
    grid-template-columns:1fr;
}

.related-grid{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav style="background:#111;position:relative;">

    <div class="logo">
        LOFOU
    </div>

    <div class="menu">

        <a href="index.html">HOME</a>

        <a href="shop.html">SHOP</a>

        <a href="about.html">ABOUT</a>

        <a href="contact.html">CONTACT</a>

    </div>

    <div class="nav-icons">

        <a href="wishlist.html">

            <i class="fa-regular fa-heart"></i>

        </a>

        <a href="cart.html" class="cart-icon">

            <i class="fa-solid fa-bag-shopping"></i>

            <span id="cartCount">0</span>

        </a>

    </div>

</nav>

<!-- PRODUCT -->

<section class="product-page">

    <div id="productContent"></div>

    <div class="related-products">

        <h2 style="margin-bottom:40px;">
            Related Products
        </h2>

        <div
            id="relatedProducts"
            class="related-grid">
        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h2>
        LOFOU
    </h2>

    <p>
        Defined By Style
    </p>

</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>

<script>

// =======================
// GET PRODUCT ID
// =======================

const params =
new URLSearchParams(
window.location.search
);

const productId =
params.get("id");

// =======================
// PRODUCT DATA
// =======================

const product =
getProductById(productId);

// =======================
// RENDER PRODUCT
// =======================

const productContent =
document.getElementById(
"productContent"
);

if(product){

productContent.innerHTML = `

<div class="product-container">

    <div class="product-image">

        <img src="${product.image}">

    </div>

    <div class="product-details">

        <h1>
            ${product.name}
        </h1>

        <div class="product-price">

            ₹${product.price}

        </div>

        <div class="product-description">

            ${product.description}

        </div>

        <h3>
            Select Size
        </h3>

        <br>

        <div class="size-options">

            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>

        </div>

        <div class="action-buttons">

            <button
                onclick="addToCart(${product.id})">

                Add To Cart

            </button>

            <button
                onclick="addToWishlist(${product.id})">

                Wishlist

            </button>

        </div>

    </div>

</div>

`;

}

// =======================
// RELATED PRODUCTS
// =======================

const relatedContainer =
document.getElementById(
"relatedProducts"
);

products
.filter(item =>
item.id != productId
)
.slice(0,3)
.forEach(item => {

relatedContainer.innerHTML += `

<div class="related-card">

<img src="${item.image}">

<h3 style="margin-top:15px;">
${item.name}
</h3>

<p>
₹${item.price}
</p>

<br>

<a href="product.html?id=${item.id}">
View Product →
</a>

</div>

`;

});

updateCartCount();

</script>

</body>
</html>
